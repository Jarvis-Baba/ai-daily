feeds:
  - name: "Hacker News"
    url: "https://hnrss.org/frontpage"
    enabled: true

fetch:
  timeout: 30
  max_articles_per_feed: 20

llm:
  provider: deepseek
  model: deepseek-chat
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com

retry:
  max_attempts: 3
  backoff_seconds: 1

filter:
  top_n: 10
  min_score: 6

output:
  dir: "./output"
  filename: "morning-{date}.md"
  template: |
    # AI 早报 — {date}

    ## 今日要闻
    {items}

    ---
    > 生成于 {timestamp}
    {cost}

content:
  fetch_fulltext: true
  timeout: 8
  max_chars: 3000