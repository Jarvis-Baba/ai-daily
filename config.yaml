feeds:
  # ═══ Tier 1: 一手信号（不可替代） ═══
  - name: "arXiv cs.AI"
    url: "https://rss.arxiv.org/rss/cs.AI"
    enabled: true
    priority: 1
  - name: "arXiv cs.CL"
    url: "https://rss.arxiv.org/rss/cs.CL"
    enabled: true
    priority: 1
  - name: "arXiv cs.LG"
    url: "https://rss.arxiv.org/rss/cs.LG"
    enabled: true
    priority: 1
  - name: "Google AI Blog"
    url: "https://blog.research.google/feeds/posts/default"
    enabled: true
    priority: 1
  - name: "Anthropic Research"
    url: "https://www.anthropic.com/research"
    enabled: true
    feed_type: blog
    priority: 1
  - name: "OpenAI Blog"
    url: "https://openai.com/blog/"
    enabled: true
    feed_type: blog
    priority: 1
  - name: "Meta AI Blog"
    url: "https://ai.meta.com/blog/"
    enabled: true
    feed_type: meta_ai_blog
    priority: 1
  # ═══ Tier 2: 核心补充 ═══
  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    enabled: true
    priority: 2
  - name: "HuggingFace Daily Papers"
    url: "https://huggingface.co/papers"
    enabled: true
    feed_type: blog
    priority: 2
  - name: "GitHub Blog"
    url: "https://github.blog/feed/"
    enabled: true
    priority: 2
  - name: "Hacker News"
    url: "hackernews top --limit 15"
    enabled: true
    feed_type: autocli
    priority: 2
  - name: "Reddit r/MachineLearning"
    url: "MachineLearning top week"
    enabled: true
    feed_type: reddit_json
    priority: 2
  - name: "SEC EDGAR"
    url: ""
    enabled: true
    feed_type: sec
    priority: 2
  # ═══ Tier 3: 辅助信号 ═══
  - name: "GitHub AI Search"
    url: "stars:>100 topic:llm"
    enabled: true
    feed_type: github_search
    priority: 3
  - name: "Medium AI"
    url: "medium feed --topic ai --limit 10"
    enabled: true
    feed_type: autocli
    priority: 3

fetch:
  timeout: 30
  max_articles_per_feed: 15

llm:
  provider: deepseek
  model: deepseek-chat
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com

retry:
  max_attempts: 3
  backoff_seconds: 1

filter:
  top_n: 12
  min_score: 6

output:
  dir: "./output"
  filename: "morning-{date}.md"
  template: |
    # AI 早报 — {date}

    ## 今日要闻
    {items}

    ---
    > 生成于 {timestamp}
    {cost}

content:
  fetch_fulltext: true
  timeout: 8
  max_chars: 3000
  routes:
    - pattern: "arxiv.org"
      fetchers: ["jina", "firecrawl", "basic"]
    - pattern: "github.com"
      fetchers: ["basic", "firecrawl"]
    - pattern: "mp.weixin.qq.com"
      fetchers: ["basic"]
    - pattern: "*"
      fetchers: ["firecrawl", "jina", "basic"]

artifact:
  enabled: true
  output_dir: "./output/artifacts"
  sources:
    # ── Event-bearing individual articles (high fact density) ──
    # GitHub Blog: product launches, security incidents, policy changes
    - "https://github.blog/news-insights/product-news/github-copilot-app-the-agent-native-desktop-experience/"
    - "https://github.blog/security/investigating-unauthorized-access-to-githubs-internal-repositories/"
    - "https://github.blog/security/raising-the-bar-quality-shared-responsibility-and-the-future-of-githubs-bug-bounty-program/"
    - "https://github.blog/ai-and-ml/github-copilot/github-recognized-as-a-leader-in-the-gartner-magic-quadrant-for-enterprise-ai-coding-agents-for-the-third-year-in-a-row/"
    - "https://github.blog/news-insights/product-news/take-your-local-github-sessions-anywhere/"
    - "https://github.blog/open-source/building-githubs-next-chapter-in-accessibility/"
    # Ars Technica: AI industry news/events
    - "https://arstechnica.com/ai/2026/06/ai-costs-how-much-github-copilot-users-react-to-new-usage-based-pricing-system/"
    - "https://arstechnica.com/ai/2026/06/meta-ai-support-chatbot-gave-hackers-access-to-notable-instagram-accounts/"
    # Anthropic official pages
    - "https://www.anthropic.com/research"
    - "https://www.anthropic.com/engineering"
    # OpenAI
    - "https://openai.com/blog/"
    # Google
    - "https://blog.google/technology/ai/"
    # ── Research claims (verifiable_fact type, not events) ──
    - "https://arxiv.org/abs/2606.02673"
    - "https://arxiv.org/abs/2606.02741"
    - "https://arxiv.org/abs/2606.02750"
    # Lilian Weng: technical claims
    - "https://lilianweng.github.io/posts/2024-07-07-hallucination/"
    - "https://lilianweng.github.io/posts/2024-11-28-reward-hacking/"
    - "https://lilianweng.github.io/posts/2025-05-01-thinking/"
  timeout: 15
  screenshot_enabled: true
  media_dir: "./output/artifacts/media"
